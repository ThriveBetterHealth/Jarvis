name: CD — Deploy to VPS

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # Images will be:
  #   ghcr.io/thrivebetterhealth/jarvis-backend:latest
  #   ghcr.io/thrivebetterhealth/jarvis-frontend:latest
  IMAGE_ORG: thrivebetterhealth
  IMAGE_REPO: jarvis

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/${{ env.IMAGE_REPO }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/${{ env.IMAGE_REPO }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/${{ env.IMAGE_REPO }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/${{ env.IMAGE_REPO }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=https://jarvisapp.cloud
            NEXT_PUBLIC_WS_URL=wss://jarvisapp.cloud

  deploy:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "docker-compose.yml,infra/,scripts/"
          target: /opt/jarvis/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /opt/jarvis

            REGISTRY="ghcr.io"
            IMAGE_BASE="ghcr.io/thrivebetterhealth/jarvis"

            # Login to GHCR using PAT
            echo "${{ secrets.GHCR_TOKEN }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin

            # Pull latest images
            docker pull "$IMAGE_BASE-backend:latest"
            docker pull "$IMAGE_BASE-frontend:latest"

            # Update docker-compose to use pre-built images
            export BACKEND_IMAGE="$IMAGE_BASE-backend:latest"
            export FRONTEND_IMAGE="$IMAGE_BASE-frontend:latest"

            # Run database migrations
            docker compose run --rm \
              -e DATABASE_URL \
              backend alembic upgrade head

            # Rolling restart — no downtime
            docker compose up -d --no-deps --force-recreate backend
            sleep 10
            docker compose up -d --no-deps --force-recreate worker
            docker compose up -d --no-deps --force-recreate frontend
            sleep 5

            # Reload nginx config
            docker compose exec -T nginx nginx -s reload || docker compose up -d --no-deps nginx

            # Prune old images
            docker image prune -f

            echo "=== Deploy complete ==="
            docker compose ps
